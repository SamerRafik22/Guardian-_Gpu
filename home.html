<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian — Control Center Lobby</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1e1e2e; --surface: #252535; --surface2: #2d2d45;
    --border: #3a3a5c; --text: #e0e0f0; --dim: #888aaa;
    --green: #00ff87; --red: #ff4757; --purple: #7289da;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
  .header { text-align: center; margin-bottom: 50px; }
  .logo-icon { width: 60px; height: 60px; background: var(--green); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 30px; margin: 0 auto 20px; color:#1e1e2e; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
  p.sub { color: var(--dim); font-size: 15px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; width: 100%; max-width: 1000px; margin-bottom: 40px; }
  .section-title { width: 100%; max-width: 1000px; font-size: 14px; font-weight: 600; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

  .machine-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .machine-card:hover { transform: translateY(-4px); border-color: var(--purple); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
  
  .m-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .m-icon { font-size: 24px; }
  .badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 12px; letter-spacing: 0.5px; }
  .b-live { background: rgba(0,255,135,0.15); color: var(--green); animation: pulse 2s infinite; }
  .b-off { background: var(--surface2); color: var(--dim); }

  .m-id { font-size: 18px; font-weight: 600; font-family: monospace; }
  .m-desc { font-size: 13px; color: var(--dim); margin-top: 6px; }

  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,255,135,0.4); } 70% { box-shadow: 0 0 0 6px rgba(0,255,135,0); } 100% { box-shadow: 0 0 0 0 rgba(0,255,135,0); } }
  .logout { position:absolute; top:20px; right:30px; color:var(--dim); font-size:14px; text-decoration:none; transition: color 0.15s; cursor: pointer; }
  .logout:hover { color:var(--red); }
</style>
</head>
<body>
<div class="logout" onclick="logout()">Sign Out</div>
<div class="header">
  <div class="logo-icon">🛡</div>
  <h1>Control Center Lobby</h1>
  <p class="sub">Select a machine to view its telemetry dashboard.</p>
</div>

<div class="section-title">Live Terminals</div>
<div class="grid" id="activeGrid"></div>

<div class="section-title" style="margin-top: 20px;">Offline History</div>
<div class="grid" id="offlineGrid"><div style="color:var(--dim); font-size:13px;">No historic machines found.</div></div>

<script>
async function boot() {
  try {
    const r = await fetch('/api/machines');
    const data = await r.json();
    
    document.getElementById('activeGrid').innerHTML = data.active.map(m => `
      <div class="machine-card" onclick="window.location='/'">
        <div class="m-header">
          <div class="m-icon">💻</div>
          <div class="badge b-live">● ONLINE</div>
        </div>
        <div class="m-id">${m.id}</div>
        <div class="m-desc">Currently streaming live local GPU metrics.</div>
      </div>
    `).join('');

    if (data.offline && data.offline.length > 0) {
      document.getElementById('offlineGrid').innerHTML = data.offline.map(m => `
        <div class="machine-card" onclick="window.location='/sessions'">
          <div class="m-header">
            <div class="m-icon" style="opacity:0.5">🖧</div>
            <div class="badge b-off">OFFLINE</div>
          </div>
          <div class="m-id" style="color:var(--dim)">${m.id}</div>
          <div class="m-desc">Review historical session anomalies.</div>
        </div>
      `).join('');
    }
  } catch(e) { console.error('Error fetching machines:', e); }
}

async function logout() {
  await fetch('/auth/logout', {method:'POST'});
  window.location = '/login';
}

boot();
</script>
</body>
</html>
