<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian — Session Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1e1e2e; --surface: #252535; --surface2: #2d2d45;
    --border: #3a3a5c; --text: #e0e0f0; --dim: #888aaa;
    --green: #00ff87; --red: #ff4757; --yellow: #ffd166;
    --purple: #7289da; --spotify: #1db954;
  }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
  .layout { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 220px; min-width: 220px; background: #16162a;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
  }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 20px; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; }
  .logo-icon { width: 36px; height: 36px; background: var(--purple); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #1e1e2e; }
  .logo-text { font-size: 18px; font-weight: 700; }
  .nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--dim); font-size: 14px; font-weight: 500; user-select: none; }
  .nav-item:hover { background: var(--surface); color: var(--text); }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .topbar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .health-pill { display: flex; align-items: center; gap: 8px; background: var(--surface); padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; }

  .section { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

  /* Stat cards */
  .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; flex-shrink: 0; }
  .stat-card { background: var(--surface); border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
  .stat-ico { font-size: 22px; width: 42px; height: 42px; border-radius: 10px; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
  .stat-val { font-size: 24px; font-weight: 700; line-height: 1; }
  .stat-label { font-size: 11px; color: var(--dim); margin-top: 4px; }
  .green { color: var(--green); } .red { color: var(--red); } .yellow { color: var(--yellow); }

  /* Process table */
  .bottom-row { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
  .card { background: var(--surface); border-radius: 12px; padding: 16px 18px; border: 1px solid var(--border); }
  .card-title { font-size: 11px; font-weight: 600; color: var(--dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  
  .proc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .proc-table th { text-align: left; padding: 10px 12px; color: var(--dim); font-weight: 500; border-bottom: 1px solid var(--border); }
  .proc-table td { padding: 12px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .proc-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; }
  .badge-safe { background: rgba(0,255,135,0.12); color: var(--green); }
  .badge-anomaly { background: rgba(255,71,87,0.12); color: var(--red); }
  .insight-text { font-size: 13px; line-height: 1.7; color: var(--dim); margin-bottom: 14px;}
  .insight-text strong { color: var(--text); }
  
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <a href="/" class="sidebar-logo">
      <div class="logo-icon">🗂</div>
      <span class="logo-text">History</span>
    </a>
    <nav class="nav">
      <div class="nav-item" onclick="window.location='/'">
        <span class="nav-icon">←</span> Back to Live
      </div>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Static Session Overview</span>
      <div class="health-pill">
        <div class="health-dot" id="healthDot"></div>
        <span id="healthPct">100%</span>&nbsp;Health Score
      </div>
    </div>

    <div class="section">
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-ico">⚡</div>
          <div><div class="stat-val green" id="statRows">-</div><div class="stat-label">Events Processed</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico">⚠️</div>
          <div><div class="stat-val red" id="statAlerts">-</div><div class="stat-label">Total Anomalies</div></div>
        </div>
        <div class="stat-card">
          <div class="stat-ico">🧠</div>
          <div><div class="stat-val yellow" id="statKB">-</div><div class="stat-label">KB Matches</div></div>
        </div>
      </div>

      <div class="bottom-row">
        <div class="card">
          <div class="card-title">Monitored Applications</div>
          <table class="proc-table">
            <thead><tr><th>PID</th><th>Process</th><th>Category</th><th>Score</th></tr></thead>
            <tbody id="procTableBody">
              <tr><td colspan="4" style="text-align:center; color:var(--dim)">Loading data...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="card">
          <div class="card-title">Session Details</div>
          <div class="insight-text" id="insightText">Fetching report...</div>
          <div style="font-size:11px; color:var(--dim); margin-top: 10px;">
            <div><strong>Machine:</strong> <span id="mId"></span></div>
            <div><strong>Started:</strong> <span id="sStart"></span></div>
            <div><strong>Ended:</strong> <span id="sEnd"></span></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
async function boot() {
  const parts = window.location.pathname.split('/');
  const id = parts[parts.length - 1];
  try {
    const r = await fetch(`/api/sessions/${id}`);
    if(!r.ok) throw new Error('Not found');
    const data = await r.json();
    
    document.getElementById('statRows').textContent = (data.total_rows || 0).toLocaleString();
    document.getElementById('statAlerts').textContent = (data.total_alerts || 0).toLocaleString();
    document.getElementById('statKB').textContent = (data.kb_matches || 0).toLocaleString();
    
    const h = data.health_score || 0;
    document.getElementById('healthPct').textContent = Math.round(h) + "%";
    document.getElementById('healthDot').style.background = h > 80 ? '#1db954' : h > 55 ? '#ffd166' : '#ff4757';
    
    document.getElementById('mId').textContent = data.machine_id;
    document.getElementById('sStart').textContent = new Date(data.start_time).toLocaleString();
    document.getElementById('sEnd').textContent = new Date(data.end_time).toLocaleString();
    
    document.getElementById('insightText').innerHTML = data.conclusion_text || 'No AI insights available for this session.';
    
    if (data.top_processes && data.top_processes.length) {
      document.getElementById('procTableBody').innerHTML = data.top_processes.map(p => {
        const isSafe = p.score >= 90;
        const bClass = isSafe ? 'badge-safe' : 'badge-anomaly';
        const txt = isSafe ? 'SAFE' : 'ANOMALY';
        return `<tr>
          <td style="color:var(--dim);font-family:monospace">${(p.pid||0).toString().slice(-4)}</td>
          <td><strong>${p.name.split('\\\\').pop()}</strong></td>
          <td style="color:var(--dim)">${p.category || 'Unknown'}</td>
          <td><span class="badge ${bClass}">${txt}</span></td>
        </tr>`;
      }).join('');
    } else {
      document.getElementById('procTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--dim)">No processes recorded.</td></tr>';
    }
  } catch(e) {
    document.getElementById('procTableBody').innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--red)">Failed to load session data.</td></tr>';
  }
}
boot();
</script>
</body>
</html>
